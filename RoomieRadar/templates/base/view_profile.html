{% load static %}

<style>
    body {
        background: linear-gradient(135deg, #f7f9fc, #eef2f7);
        font-family: 'Segoe UI', sans-serif;
    }

    .profile-container {
        max-width: 560px;
        margin: 90px auto;
        padding: 0 20px;
    }

    .profile-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 36px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 55px rgba(0, 0, 0, 0.12);
    }

    .profile-img {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid #e3f2fd;
        margin-bottom: 18px;
        background: #fafafa;
    }

    h2 {
        font-size: 24px;
        color: #2c3e50;
        margin-bottom: 6px;
    }

    .subtitle {
        font-size: 14px;
        color: #7f8c8d;
        margin-bottom: 25px;
    }

    .info {
        text-align: left;
        margin-top: 20px;
    }

    .info p {
        background: #f7faff;
        padding: 14px 16px;
        border-radius: 14px;
        margin-bottom: 14px;
        font-size: 15px;
        color: #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .info strong {
        color: #555;
        font-weight: 600;
    }

    .bio {
        flex-direction: column;
        gap: 6px;
    }

    .actions {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
    }

    .chat-btn {
        padding: 12px 26px;
        border-radius: 30px;
        background: #2ecc71;
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: 0.3s;
    }

    .chat-btn:hover {
        background: #27ae60;
    }

    .back-btn {
        padding: 12px 26px;
        border-radius: 30px;
        background: #1976d2;
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: #0d47a1;
    }

    @media (max-width: 500px) {
        .profile-card {
            padding: 26px;
        }
    }
</style>

<div class="profile-container">
    <div class="profile-card">

        {% if profile.photo %}
            <img src="{{ profile.photo.url }}" class="profile-img">
        {% else %}
            <img src="{% static 'images/default-avatar.png' %}" class="profile-img">
        {% endif %}

        <h2>{{ viewed_user.username }}</h2>
        <div class="subtitle">Roommate Profile</div>

        <div class="info">
            <p>
                <strong>Age</strong>
                <span>{{ profile.age }}</span>
            </p>

            <p>
                <strong>Gender</strong>
                <span>{{ profile.gender }}</span>
            </p>

            <p class="bio">
                <strong>Bio</strong>
                <span>{{ profile.bio|default:"No bio available" }}</span>
            </p>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="actions">
            <!-- Chat -->
           <a href="{% url 'start_chat' viewed_user.id %}" class="chat-btn">
    💬 Chat
</a>
<a href="{% url 'find_matches' %}" class="back-btn">
    ⬅ Back
</a>

        </div>

    </div>
</div>
